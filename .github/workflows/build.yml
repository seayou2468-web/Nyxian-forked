name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    name: Build and Package
    runs-on: macos-26

    steps:
      # 1. ソースコードチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. 依存ツールのインストール
      - name: Install Dependencies
        run: |
          set -e
          brew install ldid dpkg libarchive curl

      # 3. Theos キャッシュ
      - name: Cache Theos
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: ~/theos
          key: theos-${{ runner.os }}-v3

      # 4. Theos と SDK のインストール
      - name: Install Theos & SDKs
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          #!/bin/bash
          set -e
          THEOS_DIR="$HOME/theos"
          git clone --depth=1 https://github.com/theos/theos.git "$THEOS_DIR"
          mkdir -pv "$THEOS_DIR/sdks"

          # SDK 一括ダウンロード（文字列リスト方式）
          sdks_list=(
            "iPhoneOS16.5 https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz"
          )

          for entry in "${sdks_list[@]}"; do
            sdk_name=$(echo $entry | cut -d' ' -f1)
            sdk_url=$(echo $entry | cut -d' ' -f2)
            sdk_path="$THEOS_DIR/sdks/$sdk_name.sdk"
            if [[ -d "$sdk_path" ]]; then
              echo "[*] $sdk_name already installed, skipping..."
            else
              echo "[*] Downloading $sdk_name..."
              curl -L "$sdk_url" | tar -xJv -C "$THEOS_DIR/sdks"
            fi
          done

      # 5. 最新 SDK 自動検出
      - name: Set SDK Path
        run: |
          set -e
          LATEST_SDK=$(ls ~/theos/sdks | grep iPhoneOS | sort -V | tail -n 1)
          export THEOS_PLATFORM_SDK_ROOT="$HOME/theos/sdks/$LATEST_SDK"
          echo "THEOS_PLATFORM_SDK_ROOT=$THEOS_PLATFORM_SDK_ROOT" >> $GITHUB_ENV
          echo "[*] Using SDK: $LATEST_SDK"


      # 6. ビルド成果物キャッシュ
      - name: Cache Build Artifacts
        id: cache-artifacts
        uses: actions/cache@v4
        with:
          path: |
            Nyxian/LindChain/LLVM.xcframework
            Nyxian/LindChain/Clang.xcframework
            Nyxian/LindChain/JBSupport/libroot.a
            Nyxian/LindChain/JBSupport/tshelper
          key: build-artifacts-${{ runner.os }}-${{ hashFiles('Makefile', 'LLVM-On-iOS/Makefile', 'libroot/Makefile', 'TrollStore/Makefile') }}

      # 7. Theos 環境設定
      - name: Setup Environment
        run: |
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV

      - name: Update Theos
        run: |
          set -e
          $HOME/theos/bin/update-theos
      # 8. Jailed ビルド
      - name: Build Jailed
        run: |
          set -e
          make jailed

      # 9. 成果物アップロード
      - name: Upload Jailed
        uses: actions/upload-artifact@v4
        with:
          name: nyxian.ipa
          path: nyxian.ipa
