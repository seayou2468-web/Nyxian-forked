name: Build Rootful

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Rootful
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          set -e
          brew install ldid dpkg libarchive

      - name: Cache Theos
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: ~/theos
          key: theos-${{ runner.os }}-v1

      - name: Install Theos
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          set -e
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"

      - name: Cache Build Artifacts
        id: cache-artifacts
        uses: actions/cache@v4
        with:
          path: |
            Nyxian/LindChain/LLVM.xcframework
            Nyxian/LindChain/Clang.xcframework
            Nyxian/LindChain/JBSupport/libroot.a
            Nyxian/LindChain/JBSupport/tshelper
          key: build-artifacts-${{ runner.os }}-${{ hashFiles('Makefile', 'LLVM-On-iOS/Makefile', 'libroot/Makefile', 'TrollStore/Makefile') }}

      - name: Setup
        run: |
          set -e
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV

      - name: Build Rootful
        run: |
          set -e
          make rootful

      - name: Upload Rootful
        uses: actions/upload-artifact@v4
        with:
          name: nyxian_0.9.0_iphoneos-arm.deb
          path: nyxian_0.9.0_iphoneos-arm.deb
